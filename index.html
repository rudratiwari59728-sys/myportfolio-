<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Rudra</title>
<style>
/* Body styling */
body {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb, #a1c4fd);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    flex-direction: column;
    color: #fff;
    text-align: center;
}

/* Background gradient animation */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Birthday text */
h1 {
    font-size: 4em;
    text-shadow: 2px 2px 10px #fff, 0 0 20px #ff0, 0 0 30px #ff6, 0 0 40px #f0f;
    margin-bottom: 0.2em;
    animation: glowText 2s ease-in-out infinite alternate;
}

@keyframes glowText {
    from {text-shadow: 2px 2px 10px #fff, 0 0 20px #ff0;}
    to {text-shadow: 2px 2px 20px #ff9, 0 0 30px #f0f;}
}

/* Subtext */
p {
    font-size: 1.5em;
    color: #fff;
    margin-top: 0;
}

/* Sparkles effect */
.sparks {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    animation: sparkle 3s linear infinite;
}

@keyframes sparkle {
    0% {transform: translateY(0) scale(1);}
    50% {transform: translateY(-400px) scale(1.5);}
    100% {transform: translateY(0) scale(1);}
}
</style>
</head>
<body>

<h1>Happy Birthday Rudra!</h1>
<p>May your day be full of joy and fun 🎉</p>

<!-- Sparkles -->
<div class="sparks" style="left:10%; top:90%; animation-delay:0s;"></div>
<div class="sparks" style="left:30%; top:80%; animation-delay:1s;"></div>
<div class="sparks" style="left:50%; top:85%; animation-delay:2s;"></div>
<div class="sparks" style="left:70%; top:90%; animation-delay:1.5s;"></div>
<div class="sparks" style="left:90%; top:80%; animation-delay:0.5s;"></div>

</body>
</html>
