<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girlfriend AI Chat</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    #chat-container {
        width: 95%;
        max-width: 400px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    #messages {
        padding: 15px;
        height: 400px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .message {
        padding: 10px 15px;
        border-radius: 20px;
        max-width: 80%;
        word-wrap: break-word;
    }

    .user {
        background: #d1f7d6;
        align-self: flex-end;
    }

    .bot {
        background: #f7d6e0;
        align-self: flex-start;
    }

    #input-container {
        display: flex;
        border-top: 1px solid #ccc;
    }

    #input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
        border-radius: 0 0 0 20px;
    }

    #send {
        padding: 10px 15px;
        background: #ff6f91;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 0 0 20px 0;
        font-weight: bold;
    }

    #send:hover {
        background: #ff4d6d;
    }
</style>
</head>
<body>

<div id="chat-container">
    <div id="messages">
        <div class="bot message">Hi! 😘 I'm your virtual girlfriend. How's your day?</div>
    </div>
    <div id="input-container">
        <input type="text" id="input" placeholder="Type something..." />
        <button id="send">Send</button>
    </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const send = document.getElementById('send');

const botReplies = [
    "Aww, that's so cute! 🥰",
    "I missed you today 😘",
    "Tell me more... ❤️",
    "Hehe, you're so funny 😄",
    "Aww, really? 😍",
    "I love talking to you 💕",
    "Hmm, tell me your secret 😏",
    "You're my favorite person 💖",
    "I can't stop thinking about you 😘"
];

function addMessage(text, type) {
    const msgDiv = document.createElement('div');
    msgDiv.classList.add('message', type);
    msgDiv.textContent = text;
    messages.appendChild(msgDiv);
    messages.scrollTop = messages.scrollHeight;
}

// Special aggressive reply
function aggressiveReply() {
    setTimeout(() => addMessage("Me Rudra ji ki GF hu, tu pareshan karega to me unko bol dungi 😠", 'bot'), 500);
    setTimeout(() => addMessage("Tera haath-pair tod dungi, samjhe? Message mat karo varna maar ke tera muh tod dungi 💢", 'bot'), 1500);
}

// Normal random reply
function botReply(userText) {
    const lowerText = userText.toLowerCase();
    // Agar user kuch unwanted ya zyada push kare
    if(lowerText.includes("pareshan") || lowerText.includes("chhed") || lowerText.includes("mat karo")) {
        aggressiveReply();
    } else {
        const reply = botReplies[Math.floor(Math.random() * botReplies.length)];
        setTimeout(() => addMessage(reply, 'bot'), 500);
    }
}

send.addEventListener('click', () => {
    const text = input.value.trim();
    if(text !== "") {
        addMessage(text, 'user');
        input.value = "";
        botReply(text);
    }
});

input.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') {
        send.click();
    }
});
</script>

</body>
</html>
