<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rudra Mobile Shooter</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;

user-select:none;
-webkit-user-select:none;
}

canvas{
background:#111;
display:block;
margin:auto;
}

#fire{
position:fixed;
bottom:40px;
right:40px;
width:90px;
height:90px;
border-radius:50%;
background:red;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;

user-select:none;
-webkit-user-select:none;
touch-action:manipulation;
}

</style>
</head>

<body>

<h2>🚀 Rudra Mobile Shooter</h2>

<div id="score">Score:0</div>

<canvas id="game" width="400" height="500"></canvas>

<div id="fire">FIRE</div>

<script>

let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")

let playerX=180

let bullets=[]
let enemies=[]

let score=0

/* MOVE PLAYER */

canvas.addEventListener("touchmove",e=>{

e.preventDefault()

playerX=e.touches[0].clientX-20

})

/* SHOOT */

function shoot(){

bullets.push({
x:playerX+18,
y:440
})

}

document.getElementById("fire").addEventListener("touchstart",e=>{

e.preventDefault()

shoot()

})

/* ENEMY SPAWN */

function spawnEnemy(){

enemies.push({
x:Math.random()*360,
y:0
})

}

setInterval(spawnEnemy,1000)

/* GAME LOOP */

function update(){

ctx.clearRect(0,0,400,500)

/* PLAYER */

ctx.fillStyle="cyan"

ctx.fillRect(playerX,460,40,20)

/* BULLETS */

bullets.forEach((b,i)=>{

b.y-=6

ctx.fillStyle="red"

ctx.fillRect(b.x,b.y,4,10)

})

/* ENEMIES */

enemies.forEach((e,ei)=>{

e.y+=2

ctx.fillStyle="lime"

ctx.fillRect(e.x,e.y,25,25)

/* HIT DETECTION */

bullets.forEach((b,bi)=>{

if(
b.x < e.x+25 &&
b.x+4 > e.x &&
b.y < e.y+25 &&
b.y+10 > e.y
){

enemies.splice(ei,1)

bullets.splice(bi,1)

score++

document.getElementById("score").innerText="Score:"+score

}

})

/* GAME OVER */

if(e.y>480){

alert("Game Over | Score:"+score)

location.reload()

}

})

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
