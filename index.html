<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Calculator ❤️</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
overflow:hidden;
}

.container{
background:rgba(0,0,0,0.4);
padding:30px;
border-radius:15px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff0066;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff3385;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-600px);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ Love Calculator ❤️</h1>

<input type="text" id="name1" placeholder="Your Name">

<input type="text" id="name2" placeholder="Partner Name">

<br>

<button onclick="calculateLove()">Calculate Love</button>

<div id="result"></div>

</div>

<audio id="loveSound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<script>

function calculateLove(){

let name1=document.getElementById("name1").value;
let name2=document.getElementById("name2").value;

if(name1=="" || name2==""){
document.getElementById("result").innerHTML="Enter both names 😅";
return;
}

let score=Math.floor(Math.random()*101);

let message="";

if(score>80){
message="💍 Shaadi pakki!";
}
else if(score>60){
message="😍 Perfect Couple!";
}
else if(score>40){
message="🙂 Try harder!";
}
else{
message="💔 Friend zone!";
}

document.getElementById("result").innerHTML=
name1+" ❤️ "+name2+"<br>Love = "+score+"%<br>"+message;

document.getElementById("loveSound").play();

if(navigator.vibrate){
navigator.vibrate(200);
}

createHearts();

}

function createHearts(){

for(let i=0;i<20;i++){

let heart=document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.top="100%";

heart.style.fontSize=(Math.random()*30+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

}

}

</script>

</body>
</html>
